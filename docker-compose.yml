version: '3.8'

services:
  # Streamlit app
  app:
    build: .
    container_name: black_gold_app
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLEXSRFSUPPORT=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/app
      - app_cache:/app/.streamlit
    depends_on:
      - redis
    networks:
      - black_gold_network
    restart: unless-stopped

  # Redis for caching/data
  redis:
    image: redis:7-alpine
    container_name: black_gold_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - black_gold_network
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  black_gold_network:
    driver: bridge

volumes:
  app_cache:
  redis_data:
