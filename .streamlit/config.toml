[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
maxUploadSize = 200
enableXsrfProtection = false
headless = true

[theme]
base="light"
primaryColor = "#FF6B35"
backgroundColor="#FFFFFF"    # White background
secondaryBackgroundColor="#F0F2F6"
textColor="#000000"
font="sans serif"

#backgroundColor = "#1E1E2E"
#secondaryBackgroundColor = "#2D2D44"
#textColor = "#FFFFFF"
#font = "sans serif"
